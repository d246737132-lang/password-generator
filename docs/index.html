<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生活效率工具箱</title>
  <style>
    :root {
      --primary-color: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --success-color: #10b981;
      --error-color: #ef4444;
      --warning-color: #f59e0b;
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #475569;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #f8fafc;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2rem;
      color: #818cf8;
      margin-bottom: 10px;
    }

    header p {
      color: #64748b;
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .tab {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(51, 65, 85, 0.6);
      color: #94a3b8;
    }

    .tab.active {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .tab:hover:not(.active) {
      background: rgba(51, 65, 85, 0.8);
    }

    .card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid #475569;
      border-radius: 16px;
      padding: 24px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tool-header {
      margin-bottom: 20px;
    }

    .tool-header h2 {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .tool-header p {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background: rgba(51, 65, 85, 0.6);
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 1rem;
      font-family: 'Monaco', 'Consolas', monospace;
    }

    .form-input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      box-shadow: 0 4px 6px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(99, 102, 241, 0.5);
    }

    .btn-secondary {
      background: rgba(51, 65, 85, 0.8);
      color: #f8fafc;
      border: 1px solid #475569;
    }

    .btn-secondary:hover {
      background: #334155;
    }

    .btn-icon {
      padding: 8px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(51, 65, 85, 0.4);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .checkbox-item:hover {
      background: rgba(51, 65, 85, 0.6);
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
    }

    .checkbox-item label {
      cursor: pointer;
      font-size: 0.875rem;
    }

    .slider-container {
      margin-bottom: 8px;
    }

    .slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(51, 65, 85, 0.6);
      border-radius: 3px;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(99, 102, 241, 0.4);
    }

    .password-display {
      background: rgba(51, 65, 85, 0.6);
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 1.125rem;
      word-break: break-all;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .password-strength {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(71, 85, 105, 0.5);
    }

    .strength-bar.weak { background: #ef4444; }
    .strength-bar.medium { background: #f59e0b; }
    .strength-bar.strong { background: #10b981; }
    .strength-bar.extreme { background: #6366f1; }

    .calculator {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      margin: 0 auto;
    }

    .calc-display {
      background: rgba(15, 23, 42, 0.8);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: right;
    }

    .calc-value {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Monaco', 'Consolas', monospace;
    }

    .calc-memory {
      font-size: 1rem;
      color: #64748b;
      margin-top: 5px;
    }

    .calc-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .calc-btn {
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .calc-btn-default {
      background: rgba(71, 85, 105, 0.6);
      color: #f8fafc;
    }

    .calc-btn-default:hover {
      background: rgba(71, 85, 105, 0.8);
    }

    .calc-btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
    }

    .calc-btn-secondary {
      background: rgba(100, 116, 139, 0.6);
      color: #f8fafc;
    }

    .calc-btn-warning {
      background: rgba(245, 158, 11, 0.8);
      color: white;
    }

    .calc-btn-success {
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
    }

    .calc-btn-wide {
      grid-column: span 2;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      animation: slideIn 0.3s ease-out;
      z-index: 1000;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .toast.success { background: rgba(16, 185, 129, 0.9); }
    .toast.error { background: rgba(239, 68, 68, 0.9); }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #64748b;
      font-size: 0.875rem;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .card {
        padding: 16px;
      }

      .calc-btn {
        padding: 12px;
        font-size: 1rem;
      }

      .calc-value {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>生活效率工具箱</h1>
      <p>Life Efficiency Toolbox</p>
    </header>

    <div class="tabs">
      <button class="tab active" onclick="showTool('password')">🔐 密码生成器</button>
      <button class="tab" onclick="showTool('calculator')">🧮 简易计算器</button>
    </div>

    <!-- 密码生成器 -->
    <div id="password-tool" class="card">
      <div class="tool-header">
        <h2>密码生成器</h2>
        <p>生成安全可靠的随机密码</p>
      </div>

      <div class="form-group">
        <div class="password-display">
          <span id="password-output">点击生成按钮获取密码</span>
          <div>
            <button class="btn btn-icon btn-secondary" onclick="copyPassword()" title="复制">📋</button>
            <button class="btn btn-icon btn-secondary" onclick="generatePassword()" title="生成">🔄</button>
          </div>
        </div>
        <div class="password-strength">
          <div class="strength-bar" id="strength-1"></div>
          <div class="strength-bar" id="strength-2"></div>
          <div class="strength-bar" id="strength-3"></div>
          <div class="strength-bar" id="strength-4"></div>
        </div>
        <div id="strength-text" style="margin-top: 8px; color: #94a3b8; font-size: 0.875rem;"></div>
      </div>

      <div class="form-group">
        <div class="slider-container">
          <input type="range" id="password-length" class="slider" min="4" max="64" value="16">
        </div>
        <div style="display: flex; justify-content: space-between; color: #94a3b8;">
          <span>密码长度</span>
          <span id="length-display">16</span>
        </div>
      </div>

      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="uppercase" checked>
          <label for="uppercase">大写字母 A-Z</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="lowercase" checked>
          <label for="lowercase">小写字母 a-z</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="numbers" checked>
          <label for="numbers">数字 0-9</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="symbols">
          <label for="symbols">特殊字符 @#$%</label>
        </div>
      </div>

      <button class="btn btn-primary" onclick="generatePassword()" style="width: 100%; margin-top: 10px;">
        🔄 生成密码
      </button>
    </div>

    <!-- 简易计算器 -->
    <div id="calculator-tool" class="card" style="display: none;">
      <div class="tool-header">
        <h2>简易计算器</h2>
        <p>支持键盘输入和鼠标操作</p>
      </div>

      <div class="calculator">
        <div class="calc-display">
          <div class="calc-value" id="calc-display">0</div>
          <div class="calc-memory" id="calc-memory"></div>
        </div>

        <div class="calc-buttons">
          <button class="calc-btn calc-btn-warning" onclick="calcClear()">C</button>
          <button class="calc-btn calc-btn-secondary" onclick="calcDelete()">⌫</button>
          <button class="calc-btn calc-btn-secondary" onclick="calcPercentage()">%</button>
          <button class="calc-btn calc-btn-primary" onclick="calcOperator('/')">÷</button>
          
          <button class="calc-btn calc-btn-default" onclick="calcDigit('7')">7</button>
          <button class="calc-btn calc-btn-default" onclick="calcDigit('8')">8</button>
          <button class="calc-btn calc-btn-default" onclick="calcDigit('9')">9</button>
          <button class="calc-btn calc-btn-primary" onclick="calcOperator('*')">×</button>
          
          <button class="calc-btn calc-btn-default" onclick="calcDigit('4')">4</button>
          <button class="calc-btn calc-btn-default" onclick="calcDigit('5')">5</button>
          <button class="calc-btn calc-btn-default" onclick="calcDigit('6')">6</button>
          <button class="calc-btn calc-btn-primary" onclick="calcOperator('-')">−</button>
          
          <button class="calc-btn calc-btn-default" onclick="calcDigit('1')">1</button>
          <button class="calc-btn calc-btn-default" onclick="calcDigit('2')">2</button>
          <button class="calc-btn calc-btn-default" onclick="calcDigit('3')">3</button>
          <button class="calc-btn calc-btn-primary" onclick="calcOperator('+')">+</button>
          
          <button class="calc-btn calc-btn-secondary" onclick="calcSign()">+/-</button>
          <button class="calc-btn calc-btn-default calc-btn-wide" onclick="calcDigit('0')">0</button>
          <button class="calc-btn calc-btn-secondary" onclick="calcDecimal()">.</button>
          <button class="calc-btn calc-btn-success" onclick="calcEquals()">=</button>
        </div>
      </div>

      <div style="margin-top: 16px; padding: 12px; background: rgba(51, 65, 85, 0.4); border-radius: 8px;">
        <p style="font-size: 0.8rem; color: #64748b; text-align: center;">
          快捷键: 数字键输入 | + - * / 运算符 | Enter 等于 | Esc 清除 | Backspace 删除
        </p>
      </div>
    </div>

    <footer>
      <p>Made with ❤️ - 生活效率工具箱</p>
    </footer>
  </div>

  <script>
    // 密码生成器
    let generatedPassword = '';

    function generatePassword() {
      const length = parseInt(document.getElementById('password-length').value);
      const uppercase = document.getElementById('uppercase').checked;
      const lowercase = document.getElementById('lowercase').checked;
      const numbers = document.getElementById('numbers').checked;
      const symbols = document.getElementById('symbols').checked;

      let charset = '';
      if (uppercase) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (lowercase) charset += 'abcdefghijklmnopqrstuvwxyz';
      if (numbers) charset += '0123456789';
      if (symbols) charset += '@#$%^&*()_+-=[]{}|;:,.<>?';

      if (charset === '') {
        showToast('请至少选择一种字符类型', 'error');
        return;
      }

      let password = '';
      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * charset.length);
        password += charset[randomIndex];
      }

      generatedPassword = password;
      document.getElementById('password-output').textContent = password;
      updateStrength(password);
    }

    function updateStrength(password) {
      let score = 0;
      
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const bars = document.querySelectorAll('.strength-bar');
      bars.forEach((bar, index) => {
        bar.className = 'strength-bar';
        if (index < Math.min(Math.ceil(score / 1.5), 4)) {
          if (score <= 2) bar.classList.add('weak');
          else if (score <= 4) bar.classList.add('medium');
          else if (score <= 5) bar.classList.add('strong');
          else bar.classList.add('extreme');
        }
      });

      const text = document.getElementById('strength-text');
      if (score <= 2) text.textContent = '密码强度: 弱';
      else if (score <= 4) text.textContent = '密码强度: 中等';
      else if (score <= 5) text.textContent = '密码强度: 强';
      else text.textContent = '密码强度: 极强';
    }

    async function copyPassword() {
      if (!generatedPassword) {
        showToast('请先生成密码', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(generatedPassword);
        showToast('密码已复制到剪贴板', 'success');
      } catch (err) {
        showToast('复制失败', 'error');
      }
    }

    document.getElementById('password-length').addEventListener('input', function() {
      document.getElementById('length-display').textContent = this.value;
    });

    // 计算器
    let calcDisplay = '0';
    let storedValue = null;
    let operator = null;
    let waitingForOperand = true;

    function updateCalcDisplay() {
      document.getElementById('calc-display').textContent = calcDisplay;
    }

    function updateCalcMemory() {
      const memory = document.getElementById('calc-memory');
      if (storedValue !== null && operator) {
        memory.textContent = storedValue + ' ' + operator;
      } else {
        memory.textContent = '';
      }
    }

    function calcDigit(digit) {
      if (waitingForOperand) {
        calcDisplay = digit;
        waitingForOperand = false;
      } else {
        calcDisplay = calcDisplay === '0' ? digit : calcDisplay + digit;
      }
      updateCalcDisplay();
    }

    function calcOperator(op) {
      const inputValue = parseFloat(calcDisplay);

      if (storedValue === null) {
        storedValue = inputValue;
      } else if (operator) {
        const result = calculate(storedValue, inputValue, operator);
        calcDisplay = String(result);
        storedValue = result;
      }

      operator = op === '×' ? '*' : op === '÷' ? '/' : op;
      waitingForOperand = true;
      updateCalcDisplay();
      updateCalcMemory();
    }

    function calculate(num1, num2, op) {
      switch (op) {
        case '+': return num1 + num2;
        case '-': return num1 - num2;
        case '*': return num1 * num2;
        case '/': return num1 / num2;
        default: return num2;
      }
    }

    function calcEquals() {
      if (storedValue !== null && operator !== null) {
        const inputValue = parseFloat(calcDisplay);
        const result = calculate(storedValue, inputValue, operator);
        calcDisplay = String(result);
        storedValue = null;
        operator = null;
        waitingForOperand = true;
        updateCalcDisplay();
        updateCalcMemory();
        showToast('计算完成！', 'success');
      }
    }

    function calcDecimal() {
      if (waitingForOperand) {
        calcDisplay = '0.';
        waitingForOperand = false;
      } else if (!calcDisplay.includes('.')) {
        calcDisplay += '.';
      }
      updateCalcDisplay();
    }

    function calcClear() {
      calcDisplay = '0';
      storedValue = null;
      operator = null;
      waitingForOperand = true;
      updateCalcDisplay();
      updateCalcMemory();
    }

    function calcDelete() {
      if (calcDisplay.length > 1) {
        calcDisplay = calcDisplay.slice(0, -1);
      } else {
        calcDisplay = '0';
      }
      updateCalcDisplay();
    }

    function calcSign() {
      calcDisplay = calcDisplay.startsWith('-') ? calcDisplay.slice(1) : '-' + calcDisplay;
      updateCalcDisplay();
    }

    function calcPercentage() {
      const value = parseFloat(calcDisplay);
      calcDisplay = String(value / 100);
      updateCalcDisplay();
    }

    // 工具切换
    function showTool(toolId) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.card').forEach(card => card.style.display = 'none');
      
      event.target.classList.add('active');
      document.getElementById(toolId + '-tool').style.display = 'block';
    }

    // Toast 提示
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // 键盘支持
    document.addEventListener('keydown', function(e) {
      if (e.key >= '0' && e.key <= '9') calcDigit(e.key);
      else if (e.key === '.') calcDecimal();
      else if (['+', '-', '*', '/'].includes(e.key)) calcOperator(e.key === '*' ? '×' : e.key === '/' ? '÷' : e.key);
      else if (e.key === '=' || e.key === 'Enter') { e.preventDefault(); calcEquals(); }
      else if (e.key === 'Escape') calcClear();
      else if (e.key === 'Backspace') calcDelete();
    });

    // 初始化生成一个密码
    generatePassword();
  </script>
</body>
</html>
